<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Module 5 - My First React Application"
    />
    <title>My First React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!--
      This is the single HTML page for our Single Page Application (SPA).
      
      SPA (Single Page Application):
      - Only ONE HTML page is loaded by the browser
      - Content is dynamically updated using JavaScript (React)
      - No full page reloads when navigating
      - Faster user experience after initial load
      
      The <div id="root"> below is where React renders our components.
      React uses the Virtual DOM to efficiently update only the parts
      of the page that have changed, rather than reloading the entire page.
    -->
    <div id="root"></div>
  </body>
</html>
