# =====================================================
# Account Microservice - Application Properties
# =====================================================
# This microservice runs on the DEFAULT port 8080.
#
# In a monolithic setup, both Account and Loan would
# share the same server and port. Here, each microservice
# gets its own embedded Tomcat server instance.
#
# The Loan microservice is configured on port 8081
# to avoid port conflict (see loan/application.properties).
# =====================================================

spring.application.name=account-service

# Server port (default is 8080, no need to explicitly set)
# server.port=8080
