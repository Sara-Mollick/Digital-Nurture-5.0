# =====================================================
# Loan Microservice - Application Properties
# =====================================================
# IMPORTANT: This service MUST run on port 8081.
#
# By default, Spring Boot starts on port 8080. Since the
# Account microservice is already running on 8080, launching
# this Loan service without changing the port will cause:
#
#   "The bind address is already in use"
#
# This demonstrates a key microservice concept: each service
# runs as an INDEPENDENT application with its own embedded
# server. Unlike a monolithic WAR deployed to a single Tomcat,
# each microservice needs its own unique port.
# =====================================================

spring.application.name=loan-service

# Server port - MUST be different from Account service (8080)
server.port=8081
